<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(var(--primary));stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(var(--accent));stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Lines -->
  <path d="M 20 80 L 35 50" stroke="hsl(var(--border))" stroke-width="4" stroke-linecap="round"/>
  <path d="M 35 50 L 50 20" stroke="hsl(var(--border))" stroke-width="4" stroke-linecap="round"/>
  <path d="M 50 20 L 65 50" stroke="hsl(var(--border))" stroke-width="4" stroke-linecap="round"/>
  <path d="M 65 50 L 80 80" stroke="hsl(var(--border))" stroke-width="4" stroke-linecap="round"/>
  <path d="M 35 50 L 65 50" stroke="hsl(var(--border))" stroke-width="4" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="20" cy="80" r="8" fill="url(#grad1)" />
  <circle cx="80" cy="80" r="8" fill="url(#grad1)" />
  
  <circle cx="35" cy="50" r="8" fill="white" stroke="url(#grad1)" stroke-width="4" />
  <circle cx="65" cy="50" r="8" fill="white" stroke="url(#grad1)" stroke-width="4" />
  
  <circle cx="50" cy="20" r="10" fill="url(#grad1)" />
</svg>
